services:
  - type: web
    name: complexity-lab
    runtime: python
    plan: free
    autoDeploy: true
    buildCommand: pip install .
    startCommand: >-
      lab ingest &&
      lab panel &&
      streamlit run app/Home.py
      --server.address 0.0.0.0
      --server.port $PORT
      --server.headless true
    healthCheckPath: /_stcore/health
    envVars:
      - key: PYTHON_VERSION
        value: 3.13.5
