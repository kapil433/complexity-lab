name: Site

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  render:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
        with:
          python-version: "3.12"
      - name: Install
        run: uv sync --all-extras
      - name: Build database
        run: |
          uv run lab ingest
          uv run lab panel
      - uses: quarto-dev/quarto-actions/setup@v2
      - name: Render site
        run: uv run quarto render
        env:
          QUARTO_PYTHON: .venv/bin/python
      - uses: actions/upload-pages-artifact@v3
        with:
          path: _site

  deploy:
    needs: render
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
